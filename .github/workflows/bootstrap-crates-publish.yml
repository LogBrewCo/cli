name: Bootstrap crates.io package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref containing the bootstrap crate version
        required: true
        default: bootstrap/registry-claim
      version:
        description: Bootstrap crate version to publish
        required: true
        default: 0.0.0-bootstrap.0

permissions:
  contents: read

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout bootstrap ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Validate bootstrap package
        shell: bash
        run: |
          crate_name="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "logbrew-cli").name')"
          crate_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "logbrew-cli").version')"

          if [[ "$crate_name" != "logbrew-cli" ]]; then
            printf 'Unexpected crate name: %s\n' "$crate_name" >&2
            exit 1
          fi

          if [[ "$crate_version" != "${{ inputs.version }}" ]]; then
            printf 'Expected version %s, found %s.\n' "${{ inputs.version }}" "$crate_version" >&2
            exit 1
          fi

      - name: Publish bootstrap crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
