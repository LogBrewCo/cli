name: Publish crates.io

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  id-token: write

env:
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Check tag matches crate version
        shell: bash
        run: |
          crate_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "logbrew-cli").version')"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$crate_version" != "$tag_version" ]]; then
            printf 'Tag %s does not match Cargo.toml version %s.\n' "$GITHUB_REF_NAME" "$crate_version" >&2
            exit 1
          fi

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked
