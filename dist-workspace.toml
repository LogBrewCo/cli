[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm", "homebrew", "msi"]
# Publish jobs to run in CI
publish-jobs = ["./publish-npm-trusted", "homebrew"]
github-custom-job-permissions = { "publish-npm-trusted" = { contents = "read", id-token = "write", packages = "write" } }
# A GitHub repo to push Homebrew formulas to
tap = "LogBrewCo/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false

[dist.github-custom-runners]
global = "blacksmith-2vcpu-ubuntu-2404"
x86_64-unknown-linux-gnu = "blacksmith-2vcpu-ubuntu-2404"
aarch64-unknown-linux-gnu = "blacksmith-2vcpu-ubuntu-2404-arm"
x86_64-apple-darwin = "blacksmith-6vcpu-macos-15"
aarch64-apple-darwin = "blacksmith-6vcpu-macos-15"
x86_64-pc-windows-msvc = "blacksmith-2vcpu-windows-2025"
